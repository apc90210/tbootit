<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Модуль Авито</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { cursor: pointer; padding: 5px 10px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; max-height: 400px;}
    </style>
</head>
<body>
    <h1>Модуль Авито</h1>
    
    <div class="section">
        <h2>Парсинг профиля</h2>
        <input type="text" id="profileUrl" value="sample://avito_profile_sample" size="50">
        <br><br>
        <label>Максимум страниц: <input type="number" id="maxPages" value="1" min="1"></label>
        <br><br>
        <button onclick="parseProfile()">Скачать объявления</button>
        <p id="parseResult"></p>
    </div>
    
    <div class="section">
        <h2>Список скачанных объявлений</h2>
        <button onclick="loadAds()">Обновить список</button>
        <ul id="adsList"></ul>
    </div>
    
    <div class="section" id="jsonView" style="display:none;">
        <h2>JSON карточки</h2>
        <pre id="jsonContent"></pre>
        <button onclick="checkCoreImport()">Проверить импорт в Core</button>
        <pre id="coreResult"></pre>
    </div>

    <script>
        let currentAdId = null;

        async function parseProfile() {
            const url = document.getElementById('profileUrl').value;
            const pages = parseInt(document.getElementById('maxPages').value);
            const res = await fetch('/api/avito/profiles/parse', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({profile_url: url, max_pages: pages, save_html: true})
            });
            const data = await res.json();
            document.getElementById('parseResult').innerText = `Статус: ${data.status}. Найдено: ${data.ads_found}. Скачано: ${data.ads_saved}.`;
            loadAds();
        }

        async function loadAds() {
            const res = await fetch('/api/avito/parsed-ads');
            const ads = await res.json();
            const list = document.getElementById('adsList');
            list.innerHTML = '';
            for (let ad of ads) {
                const li = document.createElement('li');
                li.innerHTML = `[${ad.created_at}] <b>${ad.title}</b> - ${ad.price} руб. 
                    <button onclick="showJson('${ad.id}')">Показать JSON карточки</button>`;
                list.appendChild(li);
            }
        }
        
        async function showJson(adId) {
            currentAdId = adId;
            const res = await fetch(`/api/avito/parsed-ads/${adId}/product-card-json`);
            const data = await res.json();
            document.getElementById('jsonContent').innerText = JSON.stringify(data, null, 2);
            document.getElementById('jsonView').style.display = 'block';
            document.getElementById('coreResult').innerText = '';
        }

        async function checkCoreImport() {
            if (!currentAdId) return;
            const res = await fetch(`/api/avito/parsed-ads/${currentAdId}/core-import-preview`, {method: 'POST'});
            const data = await res.json();
            document.getElementById('coreResult').innerText = JSON.stringify(data.core_validation, null, 2);
        }
    </script>
</body>
</html>
