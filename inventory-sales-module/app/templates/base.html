<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техноребут — {% block title %}Рабочее место магазина{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { background: #005a9c; color: #fff; padding: 15px 20px; }
        header a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.2rem; }
        nav { background: #333; color: #fff; padding: 10px 20px; }
        nav a { color: #fff; text-decoration: none; margin-right: 15px; }
        main { padding: 20px; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .btn { padding: 5px 10px; background: #005a9c; color: #fff; text-decoration: none; border-radius: 3px; border: none; cursor: pointer; display: inline-block; }
        .btn:disabled, .btn.disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <a href="/">Техноребут — Рабочее место магазина</a>
    </header>
    <nav>
        <a href="/products">Товары</a>
        <a href="#" class="disabled" title="Будет реализовано на следующем этапе">Продажи — скоро</a>
        <a href="#" class="disabled" title="Будет реализовано на следующем этапе">Ценники — скоро</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
