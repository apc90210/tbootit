<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техноребут — {% block title %}Рабочее место магазина{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f9; color: #333; }
        header { background: #005a9c; color: #fff; padding: 15px 20px; }
        header a { color: #fff; text-decoration: none; font-weight: bold; font-size: 1.2rem; }
        nav { background: #333; color: #fff; padding: 10px 20px; }
        nav a { color: #fff; text-decoration: none; margin-right: 15px; }
        nav a:hover { text-decoration: underline; }
        nav .nav-disabled { color: #999; cursor: not-allowed; text-decoration: none; }
        main { padding: 20px; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .btn { padding: 5px 10px; background: #005a9c; color: #fff; text-decoration: none; border-radius: 3px; border: none; cursor: pointer; display: inline-block; font-size: 0.9rem; }
        .btn:hover { background: #004a80; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn:disabled, .btn.disabled { background: #ccc; cursor: not-allowed; color: #666; }
        .btn:disabled:hover, .btn.disabled:hover { background: #ccc; }
    </style>
</head>
<body>
    <header>
        <a href="/">Техноребут — Рабочее место магазина</a>
    </header>
    <nav>
        <a href="/">Главная</a>
        <a href="/products">Товары</a>
        <a href="/sales">Продажи</a>
        <a href="/cart">Корзина</a>
        <a href="/settings/organization">Настройки</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
